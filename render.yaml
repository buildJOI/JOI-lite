services:
  - type: web
    name: joi-lite
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false          # set in Render dashboard — never hardcode
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://your-render-app.onrender.com  # update after first deploy
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOI — Justified Operative Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #03070f;
    --panel:     #070d1a;
    --border:    #0e2a4a;
    --accent:    #00c8ff;
    --accent2:   #ff6aff;
    --amber:     #ffb700;
    --text:      #c8dff0;
    --dim:       #4a6a8a;
    --joi-msg:   #021828;
    --user-msg:  #0a0f1e;
    --glow:      0 0 18px rgba(0,200,255,0.35);
    --glow2:     0 0 18px rgba(255,106,255,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.2em;
    margin-top: 2px;
  }

  .logo-wrap { display: flex; flex-direction: column; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    display: inline-block;
    margin-right: 5px;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.live {
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .mood-bar {
    padding: 8px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .mood-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.15em;
    margin-right: 4px;
  }

  .mood-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 3px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .mood-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mood-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,200,255,0.08);
    box-shadow: var(--glow);
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-track { background: transparent; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .avatar.joi {
    background: linear-gradient(135deg, #001a2e, #003a5c);
    border: 1px solid var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
  }

  .avatar.user {
    background: linear-gradient(135deg, #1a0028, #3a0050);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    box-shadow: var(--glow2);
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .bubble.joi {
    background: var(--joi-msg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-msg);
    border: 1px solid var(--border);
    border-right: 2px solid var(--accent2);
    color: #d0c0e0;
    text-align: right;
  }

  .bubble-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
    margin-bottom: 5px;
    letter-spacing: 0.1em;
  }

  .typing-text::after {
    content: '▋';
    animation: blink 0.7s step-end infinite;
    color: var(--accent);
    margin-left: 2px;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .voice-wave {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 10px;
    height: 20px;
  }

  .wave-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.7;
    animation: wave 1s ease-in-out infinite;
  }

  @keyframes wave { 0%,100%{height:4px} 50%{height:16px} }

  .voice-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--accent);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thinking-row { display: flex; gap: 12px; align-items: center; }
  .thinking-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: dot-bounce 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%,80%,100%{transform:scale(0.6);opacity:0.4}
    40%{transform:scale(1);opacity:1}
  }

  .input-area {
    padding: 14px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: #050d1a;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    padding: 10px 14px;
    resize: none;
    max-height: 100px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.4;
  }

  #msg-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,200,255,0.15);
  }

  #msg-input::placeholder { color: var(--dim); }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    padding: 10px 16px;
    border: 1px solid;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
    background: transparent;
    flex-shrink: 0;
    height: 42px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-send { border-color: var(--accent); color: var(--accent); }
  .btn-send:hover:not(:disabled) { background: rgba(0,200,255,0.12); box-shadow: var(--glow); }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-clear { border-color: var(--border); color: var(--dim); font-size: 0.55rem; }
  .btn-clear:hover { border-color: var(--amber); color: var(--amber); }

  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--dim);
  }

  .voice-toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
  .voice-toggle-label:hover { color: var(--accent2); }
  .voice-toggle-label.active { color: var(--accent2); }

  #voice-toggle { display: none; }

  .toggle-track {
    width: 28px; height: 14px;
    background: var(--border);
    border-radius: 7px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--dim);
    transition: transform 0.2s, background 0.2s;
  }
  #voice-toggle:checked ~ .voice-toggle-label .toggle-track { background: rgba(255,106,255,0.3); }
  #voice-toggle:checked ~ .voice-toggle-label .toggle-track::after {
    transform: translateX(14px);
    background: var(--accent2);
  }

  .sys-msg {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    padding: 4px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo">J·O·I</div>
    <div class="logo-sub">JUSTIFIED OPERATIVE INTERFACE</div>
  </div>
  <div class="status-bar">
    <span><span class="status-dot" id="conn-dot"></span><span id="conn-text">INITIALIZING</span></span>
    <span id="mood-display">MODE: —</span>
    <span id="voice-indicator" style="color:var(--dim)">VOICE: STANDBY</span>
  </div>
</header>

<div class="mood-bar">
  <span class="mood-label">OPERATIVE MODE //</span>
  <div id="mood-buttons"></div>
</div>

<div id="chat-window">
  <div class="sys-msg">— JUSTIFIED OPERATIVE INTERFACE // BOOT SEQUENCE COMPLETE —</div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msg-input" rows="1" placeholder="Issue a directive, sir..." maxlength="2000"></textarea>
    <button class="btn btn-send" id="send-btn" onclick="sendMessage()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      TRANSMIT
    </button>
    <button class="btn btn-clear" onclick="clearHistory()" title="Clear session">CLR</button>
  </div>
  <div class="meta-bar">
    <span id="char-count">0 / 2000</span>
    <input type="checkbox" id="voice-toggle" onchange="toggleVoice(this)"/>
    <label class="voice-toggle-label" for="voice-toggle" id="voice-label">
      <span class="toggle-track"></span>
      VOICE OUTPUT
    </label>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';
  let currentMood = 'default';
  let voiceEnabled = false;
  let isThinking = false;
  let sessionId = 'session_' + Math.random().toString(36).slice(2, 9);

  const BOOT_LINES = [
    'RUNNING DIAGNOSTIC SWEEP...',
    'ALL SYSTEMS NOMINAL.',
    'GROQ NEURAL CORE // ONLINE',
    'OPERATIVE PROTOCOLS LOADED.',
    '— JOI STANDING BY —',
  ];

  const BOOT_GREETING = (
    "All systems are online, sir. " +
    "I've completed a full diagnostic — nothing unusual to report. " +
    "What can I do for you?"
  );

  async function init() {
    await loadMoods();
    const ok = await checkHealth();
    // Staggered boot log
    for (let i = 0; i < BOOT_LINES.length; i++) {
      await sleep(220);
      appendSysMsg(BOOT_LINES[i]);
    }
    await sleep(300);
    if (ok) await appendJoiMessageTyped(BOOT_GREETING, currentMood);
  }

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) { setConnected(true); return true; }
    } catch {}
    setConnected(false);
    appendSysMsg('⚠ UPLINK FAILURE — CONFIRM SERVER IS RUNNING');
    return false;
  }

  function setConnected(ok) {
    document.getElementById('conn-dot').className = 'status-dot' + (ok ? ' live' : '');
    document.getElementById('conn-text').textContent = ok ? 'UPLINK ACTIVE' : 'NO SIGNAL';
  }

  async function loadMoods() {
    try {
      const r = await fetch(`${API}/moods`);
      const data = await r.json();
      renderMoodButtons(data.moods);
    } catch {
      renderMoodButtons(['default','analytical','tactical','empathetic','playful','creative','professional','investigative','bold']);
    }
  }

  function renderMoodButtons(moods) {
    const container = document.getElementById('mood-buttons');
    container.innerHTML = '';
    moods.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'mood-btn' + (m === currentMood ? ' active' : '');
      btn.textContent = m;
      btn.onclick = () => setMood(m);
      container.appendChild(btn);
    });
    document.getElementById('mood-display').textContent = `MODE: ${currentMood.toUpperCase()}`;
  }

  function setMood(mood) {
    currentMood = mood;
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === mood);
    });
    document.getElementById('mood-display').textContent = `MODE: ${mood.toUpperCase()}`;
    appendSysMsg(`// OPERATIVE MODE SWITCHED → ${mood.toUpperCase()}`);
  }

  function toggleVoice(checkbox) {
    voiceEnabled = checkbox.checked;
    const label = document.getElementById('voice-label');
    const indicator = document.getElementById('voice-indicator');
    label.classList.toggle('active', voiceEnabled);
    indicator.textContent = `VOICE: ${voiceEnabled ? 'ACTIVE' : 'STANDBY'}`;
    indicator.style.color = voiceEnabled ? 'var(--accent2)' : 'var(--dim)';
    appendSysMsg(voiceEnabled ? '// VOICE OUTPUT ENGAGED' : '// VOICE OUTPUT DISENGAGED');
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || isThinking) return;

    input.value = '';
    updateCharCount('');
    input.style.height = 'auto';

    appendUserMessage(text);
    const thinkingEl = showThinking();
    isThinking = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          mood: currentMood,
          session_id: sessionId,
          voice_enabled: voiceEnabled,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'Server error');
      }

      const data = await res.json();
      thinkingEl.remove();
      await appendJoiMessageTyped(data.reply, data.mood);
      if (data.audio_base64) playAudio(data.audio_base64);

    } catch (err) {
      thinkingEl.remove();
      appendJoiMessage(`⚠ ${err.message}`);
    } finally {
      isThinking = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar user">SIR</div>
      <div class="bubble user">
        <div class="bubble-meta">DIRECTIVE // ${timestamp()}</div>
        ${escapeHtml(text)}
      </div>`;
    chatWindow().appendChild(row);
    scrollBottom();
  }

  function appendJoiMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="avatar joi">JOI</div>
      <div class="bubble joi">
        <div class="bubble-meta">JOI // ${timestamp()}</div>
        <div>${escapeHtml(text)}</div>
      </div>`;
    chatWindow().appendChild(row);
    scrollBottom();
  }

  async function appendJoiMessageTyped(text, mood) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    const bubble = document.createElement('div');
    bubble.className = 'bubble joi';
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.textContent = `JOI [${mood.toUpperCase()}] // ${timestamp()}`;
    const textEl = document.createElement('div');
    textEl.className = 'typing-text';
    bubble.appendChild(meta);
    bubble.appendChild(textEl);
    row.appendChild(makeAvatar('joi'));
    row.appendChild(bubble);
    chatWindow().appendChild(row);
    scrollBottom();

    const delay = Math.max(8, Math.min(22, 1400 / text.length));
    for (let i = 0; i <= text.length; i++) {
      textEl.textContent = text.slice(0, i);
      scrollBottom();
      await sleep(delay);
    }
    textEl.classList.remove('typing-text');
    return row;
  }

  function makeAvatar(type) {
    const a = document.createElement('div');
    a.className = `avatar ${type}`;
    a.textContent = type === 'joi' ? 'JOI' : 'SIR';
    return a;
  }

  function showThinking() {
    const row = document.createElement('div');
    row.className = 'thinking-row';
    row.innerHTML = `
      <div class="avatar joi">JOI</div>
      <div class="bubble joi" style="padding:14px 16px">
        <div class="thinking-dots"><span></span><span></span><span></span></div>
      </div>`;
    chatWindow().appendChild(row);
    scrollBottom();
    return row;
  }

  function appendSysMsg(text) {
    const el = document.createElement('div');
    el.className = 'sys-msg';
    el.textContent = text;
    chatWindow().appendChild(el);
    scrollBottom();
  }

  function playAudio(base64mp3) {
    try {
      const audio = new Audio('data:audio/mp3;base64,' + base64mp3);
      audio.play();
      const bubbles = document.querySelectorAll('.bubble.joi');
      const last = bubbles[bubbles.length - 1];
      if (last) {
        const wave = document.createElement('div');
        wave.className = 'voice-wave';
        [0,0.1,0.2,0.3,0.15,0.05,0.25,0.35,0.1,0.2].forEach(d => {
          const bar = document.createElement('div');
          bar.className = 'wave-bar';
          bar.style.animationDelay = `${d}s`;
          wave.appendChild(bar);
        });
        const status = document.createElement('div');
        status.className = 'voice-status';
        status.innerHTML = `<span style="animation:pulse 1s infinite">◉</span> TRANSMITTING`;
        last.appendChild(wave);
        last.appendChild(status);
        scrollBottom();
        audio.onended = () => {
          wave.remove();
          status.textContent = '◎ TRANSMISSION COMPLETE';
          setTimeout(() => status.remove(), 1500);
        };
      }
    } catch (e) { console.error('Audio error:', e); }
  }

  async function clearHistory() {
    if (!confirm('Purge session memory, sir?')) return;
    try { await fetch(`${API}/chat/history/${sessionId}`, { method: 'DELETE' }); } catch {}
    chatWindow().innerHTML = '';
    appendSysMsg('— SESSION MEMORY PURGED —');
    await appendJoiMessageTyped("Memory cleared, sir. We start fresh. What's the directive?", currentMood);
  }

  function chatWindow() { return document.getElementById('chat-window'); }
  function scrollBottom() { const w = chatWindow(); w.scrollTop = w.scrollHeight; }
  function timestamp() { return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function updateCharCount(val) {
    document.getElementById('char-count').textContent = `${val.length} / 2000`;
  }

  const input = document.getElementById('msg-input');
  input.addEventListener('input', function() {
    updateCharCount(this.value);
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOI-lite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ── Variables ── */
  :root {
    --bg: #030712;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: rgba(99,190,255,0.12);
    --border-bright: rgba(99,190,255,0.35);
    --text: #e0eaf8;
    --text-dim: #6b82a0;
    --accent: #63beef;
    --accent2: #f97dbd;
    --accent3: #a78bfa;
    --joi-bubble: rgba(13,32,55,0.85);
    --user-bubble: rgba(30,20,50,0.85);
    --glow: rgba(99,190,255,0.18);
    --glow2: rgba(249,125,189,0.14);
    --danger: #f87171;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    overflow: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(99,190,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 20%, rgba(249,125,189,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 60% 60%, rgba(167,139,250,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Grid layout ── */
  #app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    gap: 0;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(3,7,18,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(99,190,255,0.4);
  }
  .logo span { color: var(--accent2); }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  #mood-badge {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    border: 1px solid var(--border-bright);
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Sidebar ── */
  aside {
    grid-row: 2;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    background: rgba(13,17,23,0.6);
  }

  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .sidebar-label {
    font-family: var(--display);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Mood grid */
  #mood-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .mood-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: capitalize;
    transition: all 0.2s;
    text-align: left;
  }
  .mood-btn:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }
  .mood-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(99,190,255,0.08);
    text-shadow: 0 0 8px rgba(99,190,255,0.4);
  }

  /* Memory panel */
  #memory-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .memory-block {
    margin-bottom: 16px;
  }

  .memory-block-title {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: var(--display);
  }

  .memory-pill {
    display: inline-block;
    background: rgba(99,190,255,0.06);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    margin: 2px;
    font-family: var(--mono);
  }

  .memory-fact {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 0;
    border-bottom: 1px solid rgba(99,190,255,0.04);
    gap: 8px;
  }
  .memory-fact .key { color: var(--accent3); flex-shrink: 0; }
  .memory-fact .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--danger); font-size: 10px; padding: 0 2px;
    opacity: 0.4; transition: opacity 0.2s;
  }
  .memory-fact .del-btn:hover { opacity: 1; }

  .episode-item {
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 0;
    border-bottom: 1px solid rgba(99,190,255,0.04);
    line-height: 1.5;
  }
  .episode-item .ep-date { color: var(--accent3); font-size: 9px; }

  .sidebar-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .sidebar-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* ── Chat area ── */
  main {
    grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Message rows */
  .msg-row {
    display: flex;
    gap: 12px;
    animation: fadeSlide 0.3s ease both;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-family: var(--display);
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.joi {
    background: linear-gradient(135deg, #0d2037, #1a3050);
    border: 1px solid var(--border-bright);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(99,190,255,0.2);
  }
  .avatar.user {
    background: linear-gradient(135deg, #1e1432, #2d1b4e);
    border: 1px solid rgba(167,139,250,0.3);
    color: var(--accent3);
    box-shadow: 0 0 12px rgba(167,139,250,0.2);
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.65;
    font-size: 13.5px;
    position: relative;
  }

  .bubble.joi {
    background: var(--joi-bubble);
    border: 1px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    backdrop-filter: blur(8px);
  }
  .bubble.joi::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 0 30px rgba(99,190,255,0.03);
    pointer-events: none;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 14px 14px 4px 14px;
    color: #c4b5fd;
    backdrop-filter: blur(8px);
  }

  .bubble-meta {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 18px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
    opacity: 0.6;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Input bar ── */
  #input-bar {
    padding: 16px 32px 20px;
    border-top: 1px solid var(--border);
    background: rgba(3,7,18,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13.5px;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.5;
  }
  #user-input:focus {
    border-color: var(--border-bright);
    box-shadow: 0 0 0 3px rgba(99,190,255,0.08);
  }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #3b8bce);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 16px rgba(99,190,255,0.3);
  }
  #send-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 24px rgba(99,190,255,0.5);
  }
  #send-btn:active { transform: translateY(0); }
  #send-btn svg { stroke: #030712; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    #app { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header>
    <div class="logo">J<span>O</span>I<span style="color:var(--text-dim);font-size:14px;margin-left:6px;">lite</span></div>
    <div class="header-right">
      <span id="mood-badge">◈ cheerful</span>
      <div class="status-dot" title="Connected"></div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside>
    <!-- Mood selector -->
    <div class="sidebar-section">
      <div class="sidebar-label">Mood</div>
      <div id="mood-grid"></div>
    </div>

    <!-- Memory panel -->
    <div id="memory-panel">
      <div class="sidebar-label">Memory</div>

      <div class="memory-block" id="interests-block" style="display:none">
        <div class="memory-block-title">Interests</div>
        <div id="interests-pills"></div>
      </div>

      <div class="memory-block" id="goals-block" style="display:none">
        <div class="memory-block-title">Goals</div>
        <div id="goals-pills"></div>
      </div>

      <div class="memory-block" id="facts-block" style="display:none">
        <div class="memory-block-title">Known Facts</div>
        <div id="facts-list"></div>
      </div>

      <div class="memory-block" id="episodes-block" style="display:none">
        <div class="memory-block-title">Recent Memories</div>
        <div id="episodes-list"></div>
      </div>

      <button class="sidebar-btn" onclick="clearConversation()">↺ Reset Conversation</button>
      <button class="sidebar-btn" style="margin-top:4px" onclick="clearAllMemory()">⚠ Clear All Memory</button>
    </div>
  </aside>

  <!-- Chat -->
  <main>
    <div id="messages"></div>
    <div id="input-bar">
      <textarea id="user-input" placeholder="Talk to JOI..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = '';  // same-origin — no key exposed

// ── State ────────────────────────────────────────────────────────────────────
let currentMood = 'cheerful';
let isLoading = false;

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadMoods();
  loadMemory();
  autoResize();

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  document.getElementById('user-input').addEventListener('input', autoResize);
});

function autoResize() {
  const ta = document.getElementById('user-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
}

// ── Moods ────────────────────────────────────────────────────────────────────
async function loadMoods() {
  try {
    const res = await fetch(`${API}/moods`);
    const data = await res.json();
    currentMood = data.current;
    renderMoods(Object.keys(data.available), currentMood);
    updateMoodBadge(currentMood);
  } catch {
    const defaults = ['cheerful','romantic','melancholic','investigative',
                      'professional','playful','empathetic','bold'];
    renderMoods(defaults, currentMood);
  }
}

function renderMoods(moods, active) {
  const grid = document.getElementById('mood-grid');
  grid.innerHTML = '';
  moods.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn' + (m === active ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => setMood(m);
    grid.appendChild(btn);
  });
}

async function setMood(mood) {
  try {
    await fetch(`${API}/mood/${mood}`, { method: 'POST' });
    currentMood = mood;
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === mood);
    });
    updateMoodBadge(mood);
    showToast(`Mood → ${mood}`);
  } catch(e) {
    showToast('Could not set mood');
  }
}

function updateMoodBadge(mood) {
  document.getElementById('mood-badge').textContent = `◈ ${mood}`;
}

// ── Memory ───────────────────────────────────────────────────────────────────
async function loadMemory() {
  try {
    const res = await fetch(`${API}/memory`);
    const data = await res.json();
    renderMemory(data);
  } catch {}
}

function renderMemory(data) {
  const profile = data.user_profile || {};

  // Interests
  const interests = profile.interests || [];
  const iBlock = document.getElementById('interests-block');
  const iPills = document.getElementById('interests-pills');
  if (interests.length) {
    iBlock.style.display = '';
    iPills.innerHTML = interests.slice(0, 10).map(i =>
      `<span class="memory-pill">${i}</span>`).join('');
  } else { iBlock.style.display = 'none'; }

  // Goals
  const goals = profile.goals || [];
  const gBlock = document.getElementById('goals-block');
  const gPills = document.getElementById('goals-pills');
  if (goals.length) {
    gBlock.style.display = '';
    gPills.innerHTML = goals.slice(0, 6).map(g =>
      `<span class="memory-pill" style="color:var(--accent2)">${g}</span>`).join('');
  } else { gBlock.style.display = 'none'; }

  // Semantic facts
  const facts = data.semantic || {};
  const fBlock = document.getElementById('facts-block');
  const fList = document.getElementById('facts-list');
  const factEntries = Object.entries(facts);
  if (factEntries.length) {
    fBlock.style.display = '';
    fList.innerHTML = factEntries.slice(0, 12).map(([k, v]) => `
      <div class="memory-fact">
        <span class="key">${k}</span>
        <span>${typeof v.value === 'object' ? JSON.stringify(v.value) : v.value}</span>
        <button class="del-btn" onclick="deleteFact('${k}')">✕</button>
      </div>`).join('');
  } else { fBlock.style.display = 'none'; }

  // Episodes
  const episodes = data.recent_episodes || [];
  const eBlock = document.getElementById('episodes-block');
  const eList = document.getElementById('episodes-list');
  if (episodes.length) {
    eBlock.style.display = '';
    eList.innerHTML = [...episodes].reverse().slice(0, 8).map(ep => `
      <div class="episode-item">
        <div class="ep-date">${ep.timestamp?.slice(0,10) || ''} · ${ep.emotion || ''}</div>
        ${ep.summary}
      </div>`).join('');
  } else { eBlock.style.display = 'none'; }
}

async function deleteFact(key) {
  try {
    await fetch(`${API}/memory/fact/${encodeURIComponent(key)}`, { method: 'DELETE' });
    showToast(`Forgot: ${key}`);
    loadMemory();
  } catch { showToast('Could not delete fact'); }
}

async function clearConversation() {
  if (!confirm('Reset this conversation? Memory is kept.')) return;
  await fetch(`${API}/conversation/reset`, { method: 'POST' });
  document.getElementById('messages').innerHTML = '';
  showToast('Conversation reset');
}

async function clearAllMemory() {
  if (!confirm('Delete ALL of JOI\'s memory? This cannot be undone.')) return;
  await fetch(`${API}/memory/all`, { method: 'DELETE' });
  loadMemory();
  showToast('Memory cleared');
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize();
  isLoading = true;

  appendMessage('user', text);
  const typingEl = appendTyping();

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    typingEl.remove();

    appendMessage('joi', data.reply, data.mood);

    if (data.mood && data.mood !== currentMood) {
      currentMood = data.mood;
      updateMoodBadge(currentMood);
      document.querySelectorAll('.mood-btn').forEach(b => {
        b.classList.toggle('active', b.textContent === currentMood);
      });
    }

    loadMemory();  // refresh sidebar

  } catch(e) {
    typingEl.remove();
    appendMessage('joi', `⚠ ${e.message}`, 'error');
  } finally {
    isLoading = false;
  }
}

function appendMessage(role, text, mood = '') {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const initial = role === 'joi' ? 'J' : 'U';
  const timeStr = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  row.innerHTML = `
    <div class="avatar ${role}">${initial}</div>
    <div>
      <div class="bubble ${role}">${escapeHtml(text).replace(/\n/g,'<br>')}</div>
      ${mood ? `<div class="bubble-meta">${timeStr} · ${mood}</div>` : `<div class="bubble-meta">${timeStr}</div>`}
    </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row joi';
  row.innerHTML = `
    <div class="avatar joi">J</div>
    <div class="bubble joi typing">
      <span></span><span></span><span></span>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
